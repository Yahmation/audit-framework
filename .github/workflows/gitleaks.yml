# Secret scanning — uses gitleaks OSS binary directly (no paid license needed,
# unlike gitleaks-action@v2 which now requires a license for organizations).
# Fails CI on any committed secret matching default rules.
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks detect --source . --redact --no-banner --verbose
