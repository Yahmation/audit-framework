# Secret scanning — fails CI on any committed secret matching gitleaks rules.
# Catches accidental commits of API keys, tokens, .env files, service account JSON.
#
# Audit check: closes production_hardening §4.1 (secret scanning).
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan the whole tree

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
